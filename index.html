<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cronómetro Mundial</title>

<style>
body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#clock{
    width:100%;
    text-align:center;
    color:white;
    font-size:48px;
    font-weight:900;
}

button{
    font-size:18px;
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<div id="clock">00:00</div>

<button onclick="startClock()">Iniciar</button>
<button onclick="pauseClock()">Pausar</button>
<button onclick="resetClock()">Reset</button>

<script>
let segundos = 0;
let corriendo = false;

function actualizarReloj(){
    let minutos = Math.floor(segundos / 60);
    let segs = segundos % 60;

    document.getElementById("clock").innerHTML =
        String(minutos).padStart(2,"0") +
        ":" +
        String(segs).padStart(2,"0");

    if(corriendo && segundos < 2700){
        segundos++;
    }
}

setInterval(actualizarReloj,1000);

function startClock(){
    corriendo = true;
}

function pauseClock(){
    corriendo = false;
}

function resetClock(){
    corriendo = false;
    segundos = 0;
    actualizarReloj();
}
</script>

</body>
</html>
